<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil de Usuario</title>
  <link rel="stylesheet" href="../css/EditProfile.css">
</head>
<body>

<main class="perfil-card">

  <header class="perfil-header">
    <h1 class="titulo-principal">Lorem ipsum</h1>
  </header>

  <section class="avatar-seccion">
    <div class="avatar-circulo">
      <img src="../../images/aspas.svg" alt="Foto de perfil">
    </div>
    <button type="button" class="perfil-tag">Ipsum lorem</button>
  </section>

  <form class="perfil-formulario">
    <div class="campo-grupo">
      <label for="campo-nombre">lorem ipsum</label>
      <input type="text" id="campo-nombre" name="nombre" class="input-estilizado" placeholder="lorem ipsum">
    </div>

    <div class="campo-grupo">
      <label for="campo-apellido">lorem ipsum</label>
      <input type="text" id="campo-apellido" name="apellido" class="input-estilizado" placeholder="lorem ipsum">
    </div>

    <div class="campo-grupo textarea-grupo">
      <label for="campo-bio">lorem ipsum</label>
      <textarea id="campo-bio" name="bio" class="input-estilizado textarea-estilizado">Lorem ipsum dolor sit amet consectetur adipiscing elit lobortis, platea habitasse etiam penatibus vestibulum dictum id, semper litora augue pellentesque est nascetur posuere.</textarea>
    </div>

    <footer class="form-botones">
      <a href="Login.html" class="boton-accion">lorem ipsum</a>
      <a href="Login.html" class="boton-accion">lorem ipsum</a>
    </footer>
  </form>

</main>
</body>
</html>
